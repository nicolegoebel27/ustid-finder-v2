<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">

    <title>USt-ID Finder Pro</title>

    <style>

        body{

            font-family:Arial;

            margin:50px;

            background:#f5f5f5;

        }

        .box{

            width:650px;

            margin:auto;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0 0 20px rgba(0,0,0,.1);

        }

        h1{

            text-align:center;

        }

        input{

            margin-top:20px;

            margin-bottom:20px;

        }

        button{

            padding:10px 20px;

            font-size:16px;

        }

    </style>

</head>

<body>

<div class="box">

<h1>USt-ID Finder Pro</h1>

<p>

Chargecloud-Datei auswählen

</p>

<form
action="/upload"
method="post"
enctype="multipart/form-data">

<input
type="file"
name="file"
accept=".xlsx"
required>

<br>

<button type="submit">

Datei verarbeiten

</button>

</form>

</div>

</body>

</html>
